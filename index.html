<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetTravel Pro | Managed Expeditions</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        @media print {
            .print\:hidden { display: none !important; }
            .print\:my-0 { margin: 0 !important; }
            .print\:border-none { border: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Plane: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>,
            Link: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
            CloudSun: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M20 12h2"/><path d="m19.07 4.93-1.41 1.41"/><path d="M15.947 12.65a4 4 0 0 0-5.925-4.128"/><path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z"/></svg>,
            PlaneTakeoff: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 22h20"/><path d="M6.3 15H3a2 2 0 0 1-2-2v-1a2 2 0 0 1 2-2h2.8l4.4-4.1 1.9.8c.5.2.6.7.3 1.2L9 12h10l2 1v1l-2 1H9l-2.4 3.7c-.2.5-.8.7-1.2.3l-1.9-.8L6.3 15z"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Printer: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        };

        const AVIATION_STACK_KEY = "94bc09632201eb96438fe2618712f36c";
        const WEATHER_STACK_KEY = "a051e81f65f34d949f52de74808b3e8d";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR0z8w4vut1oWjNVoIx3c6VuEAybJD6biDhCV12J3XHX3oZKMhQKbTDzLgZLsG5Nwd/exec";

        const generateId = () => {
            try {
                return crypto.randomUUID();
            } catch (e) {
                return Math.random().toString(36).substring(2, 15);
            }
        };

        const fetchFlightData = async (flightIata) => {
            const cleanIata = flightIata.replace(/\s+/g, '').toUpperCase();
            try {
                const response = await fetch(`https://api.aviationstack.com/v1/flights?access_key=${AVIATION_STACK_KEY}&flight_iata=${cleanIata}`);
                const result = await response.json();
                if (!result.data || result.data.length === 0) throw new Error("Flight not found.");
                const live = result.data[0];
                return {
                    id: generateId(),
                    number: live.flight.iata,
                    airline: live.airline.name,
                    origin: live.departure.iata,
                    destination: live.arrival.iata,
                    status: live.flight_status.charAt(0).toUpperCase() + live.flight_status.slice(1),
                    departureTime: live.departure.scheduled ? new Date(live.departure.scheduled).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'TBD',
                    arrivalTime: live.arrival.scheduled ? new Date(live.arrival.scheduled).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'TBD',
                    gate: live.departure.gate || 'TBD',
                    updatedAt: new Date().toISOString()
                };
            } catch (err) { throw err; }
        };

        const QRCode = ({ value, size = 80 }) => {
            const [error, setError] = useState(false);
            if (!value) return null;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}&margin=2`;
            return (
                <div className="bg-white p-1 rounded-lg border border-slate-200 shadow-sm flex items-center justify-center overflow-hidden shrink-0" style={{ width: size + 8, height: size + 8 }}>
                    {!error ? (
                        <img src={qrUrl} alt="QR Code" className="w-full h-full object-contain" onError={() => setError(true)} loading="lazy" />
                    ) : (
                        <div className="text-[8px] text-slate-300 font-bold text-center">QR Error</div>
                    )}
                </div>
            );
        };

        const FlightTracker = ({ onSaveFlight, savedFlights, onDeleteFlight, onUpdateFlight }) => {
            const [query, setQuery] = useState('');
            const [searchResult, setSearchResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [refreshingId, setRefreshingId] = useState(null);
            const [error, setError] = useState(null);

            const handleSearch = async () => {
                if (!query) return;
                setLoading(true);
                setError(null);
                try {
                    const res = await fetchFlightData(query);
                    setSearchResult(res);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const FlightCard = ({ flight, isPreview, onCommit, onRemove, isRefreshing }) => (
                <div className={`bg-slate-900 text-white p-5 rounded-[2rem] shadow-lg relative group transition-all ${isRefreshing ? 'opacity-70 scale-[0.98]' : ''}`}>
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <span className="text-[9px] font-black text-blue-400 uppercase tracking-[0.2em]">{flight.airline}</span>
                            <h5 className="text-xl font-black leading-none">{flight.number}</h5>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className={`text-[9px] font-black px-2 py-1 rounded-lg uppercase tracking-wider ${flight.status === 'Delayed' ? 'bg-rose-500' : 'bg-emerald-500'}`}>
                                {flight.status}
                            </span>
                        </div>
                    </div>
                    <div className="flex items-center justify-between py-4 border-y border-white/5">
                        <div className="text-center">
                            <div className="text-2xl font-black">{flight.origin}</div>
                            <div className="text-[9px] font-bold text-slate-400 uppercase">{flight.departureTime}</div>
                        </div>
                        <div className="flex-1 px-4 relative flex flex-col items-center">
                            <div className="h-[2px] w-full bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 p-1 rotate-90 text-blue-400">
                                <Icons.Plane />
                            </div>
                        </div>
                        <div className="text-center">
                            <div className="text-2xl font-black">{flight.destination}</div>
                            <div className="text-[9px] font-bold text-slate-400 uppercase">{flight.arrivalTime}</div>
                        </div>
                    </div>
                    <div className="mt-4 flex justify-between items-center">
                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Gate {flight.gate}</span>
                        {isPreview ? (
                            <button onClick={onCommit} className="bg-white text-slate-900 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-blue-400 hover:text-white">Commit</button>
                        ) : (
                            <button onClick={onRemove} className="text-white/20 hover:text-rose-500 transition-colors"><Icons.Trash /></button>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
                        <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest flex items-center gap-2"><Icons.PlaneTakeoff /> AviationStack Live</h4>
                        <div className="flex gap-2">
                            <input 
                                type="text" placeholder="Ex: BA123" 
                                className="flex-1 bg-slate-50 border-none rounded-2xl px-5 py-3 text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-blue-500"
                                value={query} onChange={(e) => setQuery(e.target.value)}
                            />
                            <button onClick={handleSearch} className="bg-slate-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all">{loading ? '...' : 'Track'}</button>
                        </div>
                        {searchResult && <FlightCard flight={searchResult} isPreview={true} onCommit={() => { onSaveFlight(searchResult); setSearchResult(null); setQuery(''); }} />}
                    </div>
                    {savedFlights?.map(f => <FlightCard key={f.id} flight={f} onRemove={() => onDeleteFlight(f.id)} />)}
                </div>
            );
        };

        const WeatherWidget = ({ location }) => {
            const [currentWeather, setCurrentWeather] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (!location) return;
                const getWeatherData = async () => {
                    setLoading(true);
                    try {
                        const response = await fetch(`https://api.weatherstack.com/current?access_key=${WEATHER_STACK_KEY}&query=${encodeURIComponent(location)}`);
                        const data = await response.json();
                        if (data.current) {
                            setCurrentWeather({
                                temp: data.current.temperature,
                                desc: data.current.weather_descriptions[0],
                                icon: data.current.weather_icons[0],
                                locationName: data.location.name
                            });
                        }
                    } catch (err) { console.error(err); } finally { setLoading(false); }
                };
                getWeatherData();
            }, [location]);

            if (loading) return <div className="bg-white p-6 rounded-3xl border border-slate-100 animate-pulse h-32 flex items-center justify-center text-xs font-bold text-slate-300 uppercase tracking-widest">Weather Sync...</div>;
            if (!currentWeather) return null;

            return (
                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 flex items-center gap-2"><Icons.CloudSun /> {currentWeather.locationName}</h4>
                    <div className="flex items-center gap-6">
                        <img src={currentWeather.icon} className="w-16 h-16 rounded-2xl" />
                        <div className="flex-1">
                            <span className="text-4xl font-black text-slate-900 tracking-tighter">{currentWeather.temp}°</span>
                            <div className="text-sm font-bold text-slate-600 uppercase tracking-wide mt-1">{currentWeather.desc}</div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [trips, setTrips] = useState([]);
            const [activeTrip, setActiveTrip] = useState(null);
            const [syncing, setSyncing] = useState(false);
            const [view, setView] = useState('dashboard');
            const [newItem, setNewItem] = useState({ title: '', date: '', time: '', category: 'Activity' });

            const fetchData = async () => {
                setSyncing(true);
                try {
                    const response = await fetch(SCRIPT_URL);
                    const data = await response.json();
                    setTrips(Array.isArray(data) ? data : []);
                    if (activeTrip) {
                        const updated = data.find(t => t.id === activeTrip.id);
                        if (updated) setActiveTrip(updated);
                    }
                } catch (err) { console.error(err); } finally { setSyncing(false); }
            };

            useEffect(() => { fetchData(); }, []);

            const syncToSheets = async (updatedTrips) => {
                setSyncing(true);
                try {
                    await fetch(SCRIPT_URL, { 
                        method: 'POST', mode: 'no-cors', 
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(updatedTrips) 
                    });
                    setTimeout(fetchData, 1500);
                } catch (err) { console.error(err); } finally { setSyncing(false); }
            };

            const saveTripState = (updates) => {
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, ...updates } : t);
                setTrips(updatedTrips);
                setActiveTrip({ ...activeTrip, ...updates });
                syncToSheets(updatedTrips);
            };

            const addItineraryItem = () => {
                if (!newItem.title) return;
                const updated = [...(activeTrip.itinerary || []), { ...newItem, id: generateId() }];
                saveTripState({ itinerary: updated });
                setNewItem({ title: '', date: '', time: '', category: 'Activity' });
            };

            if (view === 'pdf-preview') {
                return (
                    <div className="bg-white min-h-screen p-8 text-black max-w-[800px] mx-auto border shadow-2xl my-8 print:my-0 print:border-none print:shadow-none">
                        <div className="border-b-2 border-black pb-6 mb-8 flex justify-between">
                            <h1 className="text-4xl font-bold uppercase tracking-tighter">{activeTrip?.name}</h1>
                            <button onClick={() => setView('trip-editor')} className="print:hidden text-xs font-bold border p-2 rounded uppercase">Back</button>
                        </div>
                        {activeTrip?.itinerary?.map(item => (
                            <div key={item.id} className="border-b py-4 flex justify-between items-center">
                                <div>
                                    <div className="text-xs font-bold text-slate-400 uppercase">{item.date} • {item.time}</div>
                                    <div className="text-lg font-bold uppercase">{item.title}</div>
                                </div>
                                <div className="text-[10px] font-black uppercase text-slate-400">{item.category}</div>
                            </div>
                        ))}
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('dashboard')}>
                            <div className="bg-slate-900 p-2 rounded-lg text-white"><Icons.Plane /></div>
                            <h1 className="text-lg font-bold text-slate-900 leading-none">SheetTravel</h1>
                        </div>
                        {syncing && <div className="text-[10px] font-bold text-blue-500 uppercase animate-pulse">Syncing...</div>}
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {view === 'dashboard' ? (
                            <div>
                                <header className="flex justify-between items-end mb-12">
                                    <h2 className="text-4xl font-extrabold tracking-tight">Expeditions</h2>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="Destination..." className="p-3 bg-white rounded-xl shadow border text-sm" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                        <button onClick={() => {
                                            const t = { id: generateId(), name: newItem.title, itinerary: [], flights: [] };
                                            const next = [...trips, t]; setTrips(next); syncToSheets(next); setNewItem({title:''});
                                        }} className="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase">Start</button>
                                    </div>
                                </header>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {trips.map(trip => (
                                        <div key={trip.id} onClick={() => { setActiveTrip(trip); setView('trip-editor'); }} className="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm cursor-pointer hover:border-blue-500 transition-all">
                                            <h3 className="text-2xl font-bold truncate">{trip.name}</h3>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase mt-2">{trip.itinerary?.length || 0} Stops</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-4 space-y-6">
                                    <FlightTracker onSaveFlight={f => saveTripState({ flights: [...(activeTrip.flights || []), f]})} savedFlights={activeTrip.flights} onDeleteFlight={id => saveTripState({ flights: activeTrip.flights.filter(f => f.id !== id)})} />
                                    <WeatherWidget location={activeTrip.name} />
                                    <div className="bg-white p-6 rounded-[2.5rem] border shadow-xl space-y-4">
                                        <h4 className="text-[10px] font-black uppercase text-slate-400">Add Entry</h4>
                                        <input type="text" placeholder="Title" className="w-full p-3 rounded-xl bg-slate-50" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="date" className="w-full p-3 rounded-xl bg-slate-50 text-xs" value={newItem.date} onChange={e => setNewItem({...newItem, date: e.target.value})} />
                                            <input type="time" className="w-full p-3 rounded-xl bg-slate-50 text-xs" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} />
                                        </div>
                                        <button onClick={addItineraryItem} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl text-[10px] uppercase">Add Stop</button>
                                    </div>
                                </div>
                                <div className="lg:col-span-8">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-3xl font-black uppercase tracking-tighter">{activeTrip.name}</h2>
                                        <button onClick={() => setView('pdf-preview')} className="text-[10px] font-black uppercase tracking-widest bg-slate-900 text-white px-4 py-2 rounded-lg">Export</button>
                                    </div>
                                    <div className="space-y-4">
                                        {activeTrip?.itinerary?.map(item => (
                                            <div key={item.id} className="bg-white p-6 rounded-[2rem] border shadow-sm flex justify-between items-center">
                                                <div>
                                                    <span className="text-[8px] font-black uppercase bg-slate-100 px-2 py-0.5 rounded mr-2">{item.category}</span>
                                                    <span className="text-[10px] font-bold text-slate-400">{item.time}</span>
                                                    <h4 className="text-lg font-bold uppercase tracking-tight">{item.title}</h4>
                                                </div>
                                                <button onClick={() => saveTripState({ itinerary: activeTrip.itinerary.filter(i => i.id !== item.id)})} className="text-slate-200 hover:text-rose-500"><Icons.Trash /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
