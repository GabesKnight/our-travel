<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetTravel - Pro Trip Planner</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR0z8w4vut1oWjNVoIx3c6VuEAybJD6biDhCV12J3XHX3oZKMhQKbTDzLgZLsG5Nwd/exec";

        const App = () => {
            const [trips, setTrips] = useState([]);
            const [activeTrip, setActiveTrip] = useState(null);
            const [syncing, setSyncing] = useState(false);
            const [error, setError] = useState(null);
            const [view, setView] = useState('dashboard');
            
            const [newTripName, setNewTripName] = useState('');
            const [itineraryItem, setItineraryItem] = useState({ 
                title: '', 
                time: '', 
                date: '', 
                cost: 0,
                url: '',
                notes: '',
                category: 'Activity' 
            });

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const fetchData = async () => {
                if (!SCRIPT_URL) return;
                setSyncing(true);
                try {
                    const response = await fetch(SCRIPT_URL);
                    if (!response.ok) throw new Error('Failed to reach Google Sheets');
                    const data = await response.json();
                    setTrips(Array.isArray(data) ? data : []);
                    
                    if (activeTrip) {
                        const updated = data.find(t => t.id === activeTrip.id);
                        if (updated) setActiveTrip(updated);
                    }
                } catch (err) {
                    setError("Connection issue. Ensure Apps Script is deployed correctly.");
                } finally {
                    setSyncing(false);
                    setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, [activeTrip?.id]);

            const syncToSheets = async (updatedTrips) => {
                setSyncing(true);
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedTrips)
                    });
                    setTimeout(fetchData, 1500); 
                } catch (err) {
                    setError("Failed to save changes.");
                } finally {
                    setSyncing(false);
                }
            };

            const createTrip = async (e) => {
                e.preventDefault();
                if (!newTripName.trim()) return;
                const newTrip = { id: crypto.randomUUID(), name: newTripName, createdAt: Date.now(), itinerary: [], budget: 0 };
                const updated = [...trips, newTrip];
                setTrips(updated);
                await syncToSheets(updated);
                setNewTripName('');
            };

            const addItineraryItem = async () => {
                if (!itineraryItem.title || !activeTrip) return;
                const newItem = { ...itineraryItem, id: crypto.randomUUID() };
                const updatedItinerary = [...(activeTrip.itinerary || []), newItem];
                
                // Sort by date and then time
                updatedItinerary.sort((a, b) => {
                    const dateA = new Date(a.date + ' ' + (a.time || '00:00'));
                    const dateB = new Date(b.date + ' ' + (b.time || '00:00'));
                    return dateA - dateB;
                });

                const totalBudget = updatedItinerary.reduce((sum, item) => sum + (parseFloat(item.cost) || 0), 0);
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, itinerary: updatedItinerary, budget: totalBudget } : t);
                setTrips(updatedTrips);
                await syncToSheets(updatedTrips);
                setItineraryItem({ title: '', time: '', date: '', cost: 0, url: '', notes: '', category: 'Activity' });
            };

            const removeItineraryItem = async (itemId) => {
                const updatedItinerary = activeTrip.itinerary.filter(item => item.id !== itemId);
                const totalBudget = updatedItinerary.reduce((sum, item) => sum + (parseFloat(item.cost) || 0), 0);
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, itinerary: updatedItinerary, budget: totalBudget } : t);
                setTrips(updatedTrips);
                await syncToSheets(updatedTrips);
            };

            const deleteTrip = async (e, id) => {
                e.stopPropagation();
                const updated = trips.filter(t => t.id !== id);
                setTrips(updated);
                await syncToSheets(updated);
            };

            // Group itinerary by date for a professional look
            const groupedItinerary = useMemo(() => {
                if (!activeTrip?.itinerary) return {};
                return activeTrip.itinerary.reduce((groups, item) => {
                    const date = item.date || 'Unscheduled';
                    if (!groups[date]) groups[date] = [];
                    groups[date].push(item);
                    return groups;
                }, {});
            }, [activeTrip?.itinerary]);

            return (
                <div className="min-h-screen pb-12">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setView('dashboard'); setActiveTrip(null); }}>
                            <div className="bg-emerald-600 p-2.5 rounded-xl text-white shadow-lg shadow-emerald-100">
                                <Icon name="plane" size={22} />
                            </div>
                            <h1 className="text-xl font-black tracking-tight text-slate-800">SheetTravel</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            {error && <div className="text-rose-500 text-xs font-semibold bg-rose-50 px-3 py-1.5 rounded-full border border-rose-100 flex items-center gap-1.5"><Icon name="alert-circle" size={14}/> {error}</div>}
                            {syncing && <div className="text-emerald-600 text-xs font-bold flex items-center gap-1.5 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100"><Icon name="refresh-cw" size={14} className="animate-spin" /> Syncing</div>}
                            <div className="hidden sm:flex bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full text-xs font-bold border border-slate-200 items-center gap-1.5">
                                <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                                Live Cloud Sync
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {view === 'dashboard' ? (
                            <div className="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                <header className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div>
                                        <h2 className="text-4xl font-black text-slate-900 tracking-tight">Your Adventures</h2>
                                        <p className="text-slate-500 font-medium mt-2">Professional trip planning powered by Google Sheets.</p>
                                    </div>
                                    <form onSubmit={createTrip} className="flex gap-2 p-1.5 bg-white rounded-2xl shadow-sm border border-slate-200 w-full md:w-auto">
                                        <input 
                                            type="text" placeholder="Where to next?" 
                                            className="px-4 py-2 bg-transparent focus:outline-none w-full md:w-64 font-medium"
                                            value={newTripName} onChange={(e) => setNewTripName(e.target.value)}
                                        />
                                        <button type="submit" className="bg-slate-900 hover:bg-emerald-600 text-white px-6 py-2.5 rounded-xl flex items-center gap-2 font-bold transition-all shadow-lg active:scale-95">
                                            <Icon name="plus" size={18} /> Plan
                                        </button>
                                    </form>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {trips.length === 0 && !syncing ? (
                                        <div className="col-span-full py-32 text-center border-2 border-dashed border-slate-200 rounded-[2.5rem] bg-white/50">
                                            <div className="bg-white w-20 h-20 rounded-full flex items-center justify-center mx-auto shadow-sm border border-slate-100 mb-6">
                                                <Icon name="map" size={32} className="text-slate-300" />
                                            </div>
                                            <p className="text-slate-500 font-bold text-xl">The world is waiting.</p>
                                            <p className="text-slate-400 mt-1">Start by creating your first trip above.</p>
                                        </div>
                                    ) : (
                                        trips.map(trip => (
                                            <div key={trip.id} onClick={() => { setActiveTrip(trip); setView('trip-details'); }} className="group bg-white p-7 rounded-[2rem] border border-slate-200 hover:shadow-2xl hover:shadow-emerald-900/5 hover:border-emerald-200 transition-all cursor-pointer relative overflow-hidden active:scale-[0.98]">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="bg-emerald-50 text-emerald-600 p-4 rounded-2xl group-hover:bg-emerald-600 group-hover:text-white transition-colors"><Icon name="map-pin" size={28} /></div>
                                                    <button onClick={(e) => deleteTrip(e, trip.id)} className="text-slate-300 hover:text-rose-500 p-2 hover:bg-rose-50 rounded-xl transition-all"><Icon name="trash-2" size={18} /></button>
                                                </div>
                                                <h3 className="text-2xl font-black text-slate-800 mb-2 group-hover:text-emerald-700 transition-colors">{trip.name}</h3>
                                                <div className="flex items-center gap-5 mt-6 pt-6 border-t border-slate-50 text-slate-500 text-sm font-bold">
                                                    <span className="flex items-center gap-1.5"><Icon name="wallet" size={16} className="text-emerald-500"/> ${trip.budget || 0}</span>
                                                    <span className="flex items-center gap-1.5"><Icon name="calendar" size={16} className="text-emerald-500"/> {trip.itinerary?.length || 0} stops</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-in slide-in-from-right duration-500 space-y-8">
                                <div className="flex items-center justify-between">
                                    <button onClick={() => setView('dashboard')} className="text-slate-600 hover:text-emerald-600 flex items-center gap-2 font-bold bg-white px-5 py-2.5 rounded-2xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                                        <Icon name="arrow-left" size={18} /> Dashboard
                                    </button>
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-600 text-white px-6 py-2.5 rounded-2xl flex items-center gap-2 font-black shadow-lg shadow-emerald-100">
                                            <Icon name="dollar-sign" size={18} /> {activeTrip?.budget} 
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    {/* Left Panel: Planning Form */}
                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm sticky top-24">
                                            <h3 className="text-xl font-black text-slate-800 mb-6 flex items-center gap-2">
                                                <Icon name="plus-circle" className="text-emerald-600" /> Add to Itinerary
                                            </h3>
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 mb-1.5 block">What's the plan?</label>
                                                    <input type="text" placeholder="e.g. Flight to Paris, Dinner at Louvres" className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" value={itineraryItem.title} onChange={(e) => setItineraryItem({...itineraryItem, title: e.target.value})}/>
                                                </div>
                                                
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 mb-1.5 block">Date</label>
                                                        <input type="date" className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" value={itineraryItem.date} onChange={(e) => setItineraryItem({...itineraryItem, date: e.target.value})}/>
                                                    </div>
                                                    <div>
                                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 mb-1.5 block">Time</label>
                                                        <input type="time" className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" value={itineraryItem.time} onChange={(e) => setItineraryItem({...itineraryItem, time: e.target.value})}/>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 mb-1.5 block">Estimated Cost</label>
                                                        <input type="number" placeholder="0.00" className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" value={itineraryItem.cost} onChange={(e) => setItineraryItem({...itineraryItem, cost: e.target.value})}/>
                                                    </div>
                                                    <div>
                                                        <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 mb-1.5 block">Category</label>
                                                        <select className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 font-medium bg-white" value={itineraryItem.category} onChange={(e) => setItineraryItem({...itineraryItem, category: e.target.value})}>
                                                            <option>Activity</option>
                                                            <option>Transport</option>
                                                            <option>Stay</option>
                                                            <option>Food</option>
                                                        </select>
                                                    </div>
                                                </div>

                                                <div>
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 mb-1.5 block">Booking URL / Location</label>
                                                    <input type="url" placeholder="https://..." className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 font-medium" value={itineraryItem.url} onChange={(e) => setItineraryItem({...itineraryItem, url: e.target.value})}/>
                                                </div>

                                                <div>
                                                    <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1 mb-1.5 block">Private Notes</label>
                                                    <textarea rows="3" placeholder="Confirmation numbers, details..." className="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 font-medium resize-none" value={itineraryItem.notes} onChange={(e) => setItineraryItem({...itineraryItem, notes: e.target.value})}></textarea>
                                                </div>

                                                <button onClick={addItineraryItem} className="w-full bg-slate-900 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2">
                                                    Confirm Event
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Right Panel: Itinerary Display */}
                                    <div className="lg:col-span-8 space-y-10">
                                        <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                                            <div className="p-8 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                                <div>
                                                    <h2 className="text-3xl font-black text-slate-900">{activeTrip?.name}</h2>
                                                    <p className="text-slate-500 font-bold flex items-center gap-1.5 mt-1">
                                                        <Icon name="calendar-days" size={16} className="text-emerald-500" /> Full Itinerary
                                                    </p>
                                                </div>
                                            </div>

                                            <div className="p-8">
                                                {Object.keys(groupedItinerary).length === 0 ? (
                                                    <div className="py-20 text-center">
                                                        <Icon name="calendar-range" size={64} className="mx-auto text-slate-100 mb-4" />
                                                        <p className="text-slate-400 font-bold text-lg">Your timeline is empty.</p>
                                                        <p className="text-slate-400">Add activities on the left to build your trip.</p>
                                                    </div>
                                                ) : (
                                                    <div className="space-y-12">
                                                        {Object.keys(groupedItinerary).sort().map(date => (
                                                            <div key={date} className="relative">
                                                                <div className="flex items-center gap-4 mb-6 sticky top-20 z-10 py-2">
                                                                    <div className="bg-slate-900 text-white px-4 py-1.5 rounded-full text-sm font-black shadow-lg">
                                                                        {date === 'Unscheduled' ? date : new Date(date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}
                                                                    </div>
                                                                    <div className="h-px bg-slate-200 flex-1"></div>
                                                                </div>

                                                                <div className="space-y-6 ml-2 md:ml-6 border-l-2 border-slate-100 pl-6 md:pl-10">
                                                                    {groupedItinerary[date].map(item => (
                                                                        <div key={item.id} className="relative group bg-white rounded-3xl border border-slate-100 p-6 shadow-sm hover:shadow-xl hover:border-emerald-100 transition-all">
                                                                            <div className="absolute -left-[41px] md:-left-[57px] top-8 w-4 h-4 rounded-full border-4 border-white bg-emerald-500 ring-4 ring-slate-50 z-10 group-hover:scale-125 transition-transform"></div>
                                                                            
                                                                            <div className="flex flex-col md:flex-row md:items-start justify-between gap-4">
                                                                                <div className="space-y-1 flex-1">
                                                                                    <div className="flex items-center gap-2">
                                                                                        <span className="text-xs font-black uppercase tracking-tighter px-2 py-0.5 rounded bg-slate-100 text-slate-500">{item.category}</span>
                                                                                        <span className="text-emerald-600 font-black text-sm">{item.time || '--:--'}</span>
                                                                                    </div>
                                                                                    <h4 className="text-xl font-black text-slate-800">{item.title}</h4>
                                                                                    
                                                                                    {item.notes && <p className="text-slate-500 text-sm mt-2 bg-slate-50 p-3 rounded-xl border border-slate-100 italic">"{item.notes}"</p>}
                                                                                    
                                                                                    <div className="flex flex-wrap gap-4 mt-4">
                                                                                        {item.url && (
                                                                                            <a href={item.url} target="_blank" rel="noopener" className="flex items-center gap-1.5 text-xs font-bold text-emerald-600 hover:underline bg-emerald-50 px-3 py-1.5 rounded-lg">
                                                                                                <Icon name="link" size={14} /> Open Link
                                                                                            </a>
                                                                                        )}
                                                                                        <div className="flex items-center gap-1.5 text-xs font-black text-slate-600 bg-slate-100 px-3 py-1.5 rounded-lg">
                                                                                            <Icon name="dollar-sign" size={14} /> ${item.cost || 0}
                                                                                        </div>
                                                                                    </div>
                                                                                </div>
                                                                                
                                                                                <button onClick={() => removeItineraryItem(item.id)} className="md:opacity-0 group-hover:opacity-100 p-2.5 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                                                                                    <Icon name="trash-2" size={18} />
                                                                                </button>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
