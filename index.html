<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetTravel Pro | Expedition Manifesto</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Plane: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>,
            Link: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
            CloudSun: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="M20 12h2"/><path d="m19.07 4.93-1.41 1.41"/><path d="M15.947 12.65a4 4 0 0 0-5.925-4.128"/><path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z"/></svg>,
            PlaneTakeoff: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 22h20"/><path d="M6.3 15H3a2 2 0 0 1-2-2v-1a2 2 0 0 1 2-2h2.8l4.4-4.1 1.9.8c.5.2.6.7.3 1.2L9 12h10l2 1v1l-2 1H9l-2.4 3.7c-.2.5-.8.7-1.2.3l-1.9-.8L6.3 15z"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Printer: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        };

        const apiKey = ""; // Shared environment key
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR0z8w4vut1oWjNVoIx3c6VuEAybJD6biDhCV12J3XHX3oZKMhQKbTDzLgZLsG5Nwd/exec";

        const generateId = () => {
            try { return crypto.randomUUID(); } catch (e) { return Math.random().toString(36).substring(2, 15); }
        };

        const callGemini = async (prompt, systemPrompt = "") => {
            const maxRetries = 5;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: systemPrompt ? { parts: [{ text: systemPrompt }] } : undefined,
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        };

        const QRCode = ({ value, size = 80 }) => {
            const [error, setError] = useState(false);
            if (!value) return null;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(value)}&margin=2`;
            return (
                <div className="bg-white p-1 rounded-lg border border-slate-200 shadow-sm flex items-center justify-center overflow-hidden shrink-0" style={{ width: size + 8, height: size + 8 }}>
                    {!error ? <img src={qrUrl} alt="QR Code" className="w-full h-full object-contain" onError={() => setError(true)} loading="lazy" /> : <div className="text-[8px] text-slate-300 font-bold text-center">QR Error</div>}
                </div>
            );
        };

        const FlightTracker = ({ onSaveFlight, savedFlights, onDeleteFlight, onUpdateFlight }) => {
            const [query, setQuery] = useState('');
            const [searchResult, setSearchResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [refreshingId, setRefreshingId] = useState(null);
            const [error, setError] = useState(null);

            const trackFlight = async (flightNum) => {
                setLoading(true); setError(null);
                try {
                    const result = await callGemini(`Interpret flight number "${flightNum}". Return a JSON object with: "number", "airline", "origin" (3-letter), "destination" (3-letter), "status" (Scheduled, On Time, Delayed, In Air), "departureTime", "arrivalTime", "gate", "updatedAt" (ISO String).`);
                    return { ...result, id: generateId(), updatedAt: new Date().toISOString() };
                } catch (err) { throw new Error("Unable to retrieve flight data."); } finally { setLoading(false); }
            };

            const handleSearch = async () => {
                if (!query) return;
                try { const res = await trackFlight(query); setSearchResult(res); } catch (err) { setError(err.message); }
            };

            const handleRefresh = async (flight) => {
                setRefreshingId(flight.id);
                try { const updated = await trackFlight(flight.number); onUpdateFlight({ ...updated, id: flight.id }); } catch (err) { console.error("Refresh failed", err); } finally { setRefreshingId(null); }
            };

            const FlightCard = ({ flight, isPreview, onCommit, onRemove, isRefreshing }) => (
                <div className={`bg-slate-900 text-white p-5 rounded-[2rem] shadow-lg relative group transition-all ${isRefreshing ? 'opacity-70 scale-[0.98]' : ''}`}>
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <span className="text-[9px] font-black text-blue-400 uppercase tracking-[0.2em]">{flight.airline}</span>
                            <h5 className="text-xl font-black leading-none">{flight.number}</h5>
                        </div>
                        <div className="flex items-center gap-2">
                            {!isPreview && (
                                <button onClick={() => handleRefresh(flight)} className={`p-2 rounded-full bg-white/5 hover:bg-white/10 transition-colors ${isRefreshing ? 'animate-spin' : ''}`}><Icons.Refresh /></button>
                            )}
                            <span className={`text-[9px] font-black px-2 py-1 rounded-lg uppercase tracking-wider ${flight.status === 'Delayed' ? 'bg-rose-500' : flight.status === 'In Air' ? 'bg-blue-500' : 'bg-emerald-500'}`}>{flight.status}</span>
                        </div>
                    </div>
                    <div className="flex items-center justify-between py-4 border-y border-white/5">
                        <div className="text-center">
                            <div className="text-2xl font-black">{flight.origin}</div>
                            <div className="text-[9px] font-bold text-slate-400 uppercase">{flight.departureTime}</div>
                        </div>
                        <div className="flex-1 px-4 relative flex flex-col items-center">
                            <div className="h-[2px] w-full bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 p-1">
                                <div className="rotate-90 text-blue-400 scale-90"><Icons.Plane /></div>
                            </div>
                        </div>
                        <div className="text-center">
                            <div className="text-2xl font-black">{flight.destination}</div>
                            <div className="text-[9px] font-bold text-slate-400 uppercase">{flight.arrivalTime}</div>
                        </div>
                    </div>
                    <div className="mt-4 flex justify-between items-center">
                        <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Gate {flight.gate || 'TBD'} • {new Date(flight.updatedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        {isPreview ? (
                            <div className="flex gap-2">
                                <button onClick={() => setSearchResult(null)} className="text-[9px] font-black uppercase tracking-widest text-slate-400 hover:text-white">Discard</button>
                                <button onClick={onCommit} className="bg-white text-slate-900 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-blue-400 hover:text-white">Commit</button>
                            </div>
                        ) : <button onClick={onRemove} className="text-white/20 hover:text-rose-500 transition-colors"><Icons.Trash /></button>}
                    </div>
                </div>
            );

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
                        <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest flex items-center gap-2"><Icons.PlaneTakeoff /> Flight Intel</h4>
                        <div className="flex gap-2">
                            <input type="text" placeholder="Ex: UA456" className="flex-1 bg-slate-50 border-none rounded-2xl px-5 py-3 text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-blue-500" value={query} onChange={(e) => setQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSearch()} />
                            <button disabled={loading} onClick={handleSearch} className="bg-slate-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 disabled:opacity-50 transition-all">{loading ? '...' : 'Track'}</button>
                        </div>
                        {error && <p className="text-[9px] text-rose-500 font-bold uppercase">{error}</p>}
                        {searchResult && <div className="pt-2"><FlightCard flight={searchResult} isPreview={true} onCommit={() => { onSaveFlight(searchResult); setSearchResult(null); setQuery(''); }} /></div>}
                    </div>
                    {savedFlights?.length > 0 && <div className="space-y-4">{savedFlights.map(f => <FlightCard key={f.id} flight={f} onRemove={() => onDeleteFlight(f.id)} isRefreshing={refreshingId === f.id} />)}</div>}
                </div>
            );
        };

        const WeatherWidget = ({ location }) => {
            const [forecast, setForecast] = useState(null);
            const [loading, setLoading] = useState(false);
            useEffect(() => {
                if (!location) return;
                const getWeatherData = async () => {
                    setLoading(true);
                    try {
                        const { lat, lon } = await callGemini(`Give me latitude and longitude for "${location}" as JSON object with keys "lat" and "lon".`);
                        const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
                        const weatherData = await weatherRes.json();
                        const formatted = weatherData.daily.time.map((t, i) => ({
                            weekday: new Date(t + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' }),
                            dayMonth: new Date(t + 'T00:00:00').toLocaleDateString('en-US', { month: 'numeric', day: 'numeric' }),
                            max: Math.round(weatherData.daily.temperature_2m_max[i]),
                            min: Math.round(weatherData.daily.temperature_2m_min[i]),
                            code: weatherData.daily.weathercode[i]
                        }));
                        setForecast(formatted.slice(0, 5));
                    } catch (err) { console.error("Weather error:", err); } finally { setLoading(false); }
                };
                getWeatherData();
            }, [location]);
            const getWeatherIcon = (code) => { if (code <= 3) return "☀️"; if (code <= 48) return "☁️"; if (code <= 67) return "🌧️"; if (code <= 77) return "❄️"; return "⛈️"; };
            if (loading) return <div className="bg-white p-6 rounded-3xl border border-slate-100 animate-pulse h-32 flex items-center justify-center text-xs font-bold text-slate-300 uppercase tracking-widest">Weather Sync...</div>;
            if (!forecast) return null;
            return (
                <div className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 flex items-center gap-2"><Icons.CloudSun /> 5-Day Outlook: {location}</h4>
                    <div className="flex justify-between items-center gap-2 overflow-x-auto pb-2">
                        {forecast.map((day, idx) => (
                            <div key={idx} className="flex flex-col items-center min-w-[64px] border-r border-slate-50 last:border-none pr-1">
                                <span className="text-[10px] font-black text-slate-900 uppercase tracking-tighter">{day.weekday}</span>
                                <span className="text-[9px] font-bold text-slate-400 mb-1">{day.dayMonth}</span>
                                <span className="text-2xl my-1 drop-shadow-sm">{getWeatherIcon(day.code)}</span>
                                <div className="flex items-center gap-1.5 mt-1">
                                    <span className="text-[11px] font-black text-slate-900">{day.max}°</span>
                                    <span className="text-[9px] font-bold text-slate-300">{day.min}°</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        function App() {
            const [trips, setTrips] = useState([]);
            const [activeTrip, setActiveTrip] = useState(null);
            const [syncing, setSyncing] = useState(false);
            const [view, setView] = useState('dashboard');
            const [editingItemId, setEditingItemId] = useState(null);
            const initialItemState = { title: '', time: '', date: '', cost: 0, url: '', notes: '', category: 'Activity' };
            const [newItem, setNewItem] = useState(initialItemState);
            const [tempItem, setTempItem] = useState(initialItemState);

            const fetchData = async () => {
                setSyncing(true);
                try {
                    const response = await fetch(SCRIPT_URL);
                    const data = await response.json();
                    setTrips(Array.isArray(data) ? data : []);
                    if (activeTrip) {
                        const updated = data.find(t => t.id === activeTrip.id);
                        if (updated) setActiveTrip(updated);
                    }
                } catch (err) { console.error(err); } finally { setSyncing(false); }
            };

            useEffect(() => { fetchData(); }, []);

            const syncToSheets = async (updatedTrips) => {
                setSyncing(true);
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(updatedTrips) });
                    setTimeout(fetchData, 1000);
                } catch (err) { console.error(err); } finally { setSyncing(false); }
            };

            const saveTripState = async (updates) => {
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, ...updates } : t);
                setTrips(updatedTrips); setActiveTrip({ ...activeTrip, ...updates });
                await syncToSheets(updatedTrips);
            };

            const addItineraryItem = async () => {
                if (!newItem.title || !activeTrip) return;
                const updatedItinerary = [...(activeTrip.itinerary || []), { ...newItem, id: generateId() }];
                const sorted = [...updatedItinerary].sort((a, b) => new Date((a.date || '9999-12-31') + 'T' + (a.time || '00:00')) - new Date((b.date || '9999-12-31') + 'T' + (b.time || '00:00')));
                saveTripState({ itinerary: sorted, budget: sorted.reduce((sum, i) => sum + (parseFloat(i.cost) || 0), 0) });
                setNewItem(initialItemState);
            };

            const startEditing = (item) => { setEditingItemId(item.id); setTempItem({ ...item }); };

            const updateItem = async () => {
                const updatedItinerary = activeTrip.itinerary.map(i => i.id === editingItemId ? tempItem : i);
                const sorted = [...updatedItinerary].sort((a, b) => new Date((a.date || '9999-12-31') + 'T' + (a.time || '00:00')) - new Date((b.date || '9999-12-31') + 'T' + (b.time || '00:00')));
                saveTripState({ itinerary: sorted, budget: sorted.reduce((sum, i) => sum + (parseFloat(i.cost) || 0), 0) });
                setEditingItemId(null);
            };

            const deleteItem = (e, id) => {
                e.stopPropagation();
                const updatedItinerary = activeTrip.itinerary.filter(i => i.id !== id);
                saveTripState({ itinerary: updatedItinerary, budget: updatedItinerary.reduce((sum, i) => sum + (parseFloat(i.cost) || 0), 0) });
            };

            const saveFlight = (flight) => saveTripState({ flights: [...(activeTrip.flights || []), flight] });
            const deleteFlight = (id) => saveTripState({ flights: (activeTrip.flights || []).filter(f => f.id !== id) });
            const updateFlightData = (updatedFlight) => saveTripState({ flights: (activeTrip.flights || []).map(f => f.id === updatedFlight.id ? updatedFlight : f) });

            const groupedItinerary = useMemo(() => {
                if (!activeTrip?.itinerary) return {};
                return activeTrip.itinerary.reduce((groups, item) => {
                    const d = item.date || 'Unscheduled';
                    if (!groups[d]) groups[d] = [];
                    groups[d].push(item);
                    return groups;
                }, {});
            }, [activeTrip]);

            const stats = useMemo(() => ({
                total: activeTrip?.budget || 0,
                byCat: activeTrip?.itinerary?.reduce((acc, i) => { acc[i.category] = (acc[i.category] || 0) + (parseFloat(i.cost) || 0); return acc; }, {}) || {}
            }), [activeTrip]);

            const isBudgetActive = activeTrip?.trackBudget !== false;

            if (view === 'pdf-preview') {
                return (
                    <div className="bg-white min-h-screen p-8 text-black font-serif max-w-[800px] mx-auto border shadow-2xl my-8 print:my-0 print:border-none print:shadow-none">
                        <div className="flex justify-between items-start border-b-2 border-black pb-6 mb-8">
                            <div><h1 className="text-4xl font-bold uppercase tracking-tighter">{activeTrip?.name}</h1><p className="text-sm font-bold mt-1">Expedition Manifesto • {new Date().toLocaleDateString()}</p></div>
                        </div>
                        {activeTrip?.flights?.length > 0 && (
                            <div className="mb-10">
                                <h2 className="text-lg font-bold border-b-2 border-black mb-4 uppercase">Flight Logistics</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {activeTrip.flights.map(f => (
                                        <div key={f.id} className="border p-4 rounded-xl font-sans text-xs">
                                            <div className="font-black text-slate-400 uppercase tracking-widest">{f.airline} {f.number}</div>
                                            <div className="text-xl font-bold mt-1">{f.origin} → {f.destination}</div>
                                            <div className="mt-2 text-slate-500 font-bold uppercase">Gate {f.gate || 'TBD'} • {f.status}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        <div className="space-y-10">
                            {Object.keys(groupedItinerary).sort().map(dateKey => (
                                <div key={dateKey} className="break-inside-avoid">
                                    <h2 className="text-lg font-bold border-b-2 border-black mb-4 pb-1 uppercase">{dateKey}</h2>
                                    {groupedItinerary[dateKey].map(item => (
                                        <div key={item.id} className="flex gap-4 items-start border-b border-slate-100 pb-4 mb-4">
                                            <div className="w-16 font-mono text-sm font-bold pt-1">{item.time || '--:--'}</div>
                                            <div className="flex-1 flex justify-between items-start gap-4">
                                                <div><h4 className="font-bold uppercase text-md">{item.title}</h4><p className="text-[10px] uppercase font-bold text-slate-500">{item.category}</p>{item.notes && <p className="text-sm text-slate-800 mt-2">{item.notes}</p>}</div>
                                                {item.url && <QRCode value={item.url} size={120} />}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                        <div className="mt-12 text-center print:hidden"><button onClick={() => window.print()} className="bg-black text-white px-8 py-3 rounded-full font-bold uppercase tracking-widest mr-4">Print</button><button onClick={() => setView('trip-editor')} className="text-slate-900 font-bold uppercase border-b border-black">Exit</button></div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f8fafc] text-slate-900 font-sans">
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setView('dashboard'); setActiveTrip(null); }}>
                            <div className="bg-slate-900 p-2 rounded-lg text-white"><Icons.Plane /></div>
                            <h1 className="text-lg font-bold text-slate-900 leading-none">SheetTravel</h1>
                        </div>
                        {syncing && <div className="text-[10px] font-bold text-blue-500 uppercase animate-pulse">Syncing...</div>}
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {view === 'dashboard' ? (
                            <div>
                                <header className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
                                    <h2 className="text-4xl font-extrabold text-slate-900 tracking-tight">Expeditions</h2>
                                    <form onSubmit={(e) => { 
                                        e.preventDefault(); 
                                        if (newItem.title) {
                                            const t = { id: generateId(), name: newItem.title, itinerary: [], flights: [], budgetLimit: 2000, budget: 0, trackBudget: true };
                                            const nextTrips = [...trips, t]; setTrips(nextTrips); syncToSheets(nextTrips); setNewItem(initialItemState);
                                        }
                                    }} className="flex gap-2 p-1.5 bg-white rounded-2xl shadow-lg border border-slate-100">
                                        <input type="text" placeholder="Destination..." className="px-4 py-2 outline-none font-semibold text-sm" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                        <button className="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-xs uppercase">Start</button>
                                    </form>
                                </header>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {trips.map(trip => (
                                        <div key={trip.id} onClick={() => { setActiveTrip(trip); setView('trip-editor'); }} className="bg-white p-7 rounded-[2rem] border border-slate-100 hover:border-blue-500 transition-all cursor-pointer shadow-sm hover:shadow-xl group">
                                            <div className="bg-slate-50 text-slate-900 w-12 h-12 flex items-center justify-center rounded-xl mb-10 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors"><Icons.MapPin /></div>
                                            <h3 className="text-2xl font-bold text-slate-900 truncate">{trip.name}</h3>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase mt-2">{trip.trackBudget !== false ? `$${trip.budget || 0} Spent • ` : ''}{trip.itinerary?.length || 0} Stops</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div>
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setView('dashboard')} className="p-2 hover:bg-slate-100 rounded-full text-slate-400"><Icons.ChevronLeft /></button>
                                        <div><h2 className="text-3xl font-extrabold text-slate-900 uppercase tracking-tighter">{activeTrip?.name}</h2><div className="flex gap-4 mt-1"><button onClick={() => setView('trip-editor')} className={`text-[10px] font-bold uppercase border-b-2 pb-1 ${view === 'trip-editor' ? 'border-blue-600 text-blue-600' : 'text-slate-400'}`}>Itinerary</button>{isBudgetActive && <button onClick={() => setView('analytics')} className={`text-[10px] font-bold uppercase border-b-2 pb-1 ${view === 'analytics' ? 'border-blue-600 text-blue-600' : 'text-slate-400'}`}>Budget</button>}<button onClick={() => setView('settings')} className={`text-[10px] font-bold uppercase border-b-2 pb-1 ${view === 'settings' ? 'border-blue-600 text-blue-600' : 'text-slate-400'}`}>Settings</button></div></div>
                                    </div>
                                    <button onClick={() => setView('pdf-preview')} className="bg-slate-900 text-white px-5 py-3 rounded-xl font-bold text-[10px] uppercase flex items-center gap-2 hover:bg-slate-800 transition-colors shadow-lg"><Icons.Printer /> Export Manifesto</button>
                                </div>

                                {view === 'trip-editor' ? (
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                        <div className="lg:col-span-4 space-y-6">
                                            <FlightTracker onSaveFlight={saveFlight} savedFlights={activeTrip?.flights || []} onDeleteFlight={deleteFlight} onUpdateFlight={updateFlightData} />
                                            <WeatherWidget location={activeTrip?.name} />
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-xl sticky top-24 space-y-4">
                                                <h3 className="text-xs font-black uppercase text-slate-400 tracking-widest">New Stop</h3>
                                                <input type="text" placeholder="Title" className="w-full px-4 py-3 rounded-xl bg-slate-50 text-sm font-semibold border-none focus:ring-2 focus:ring-blue-500" value={newItem.title} onChange={e => setNewItem({...newItem, title: e.target.value})} />
                                                <div className="grid grid-cols-2 gap-3"><input type="date" className="w-full px-4 py-3 rounded-xl bg-slate-50 text-xs font-bold" value={newItem.date} onChange={e => setNewItem({...newItem, date: e.target.value})} /><input type="time" className="w-full px-4 py-3 rounded-xl bg-slate-50 text-xs font-bold" value={newItem.time} onChange={e => setNewItem({...newItem, time: e.target.value})} /></div>
                                                <button onClick={addItineraryItem} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl text-[11px] uppercase tracking-widest hover:bg-blue-600 transition-colors">Add Stop</button>
                                            </div>
                                        </div>
                                        <div className="lg:col-span-8 space-y-10">
                                            {Object.keys(groupedItinerary).sort().map(dateKey => (
                                                <div key={dateKey}>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><div className="h-px bg-slate-200 flex-1"></div>{dateKey}<div className="h-px bg-slate-200 flex-1"></div></h3>
                                                    <div className="space-y-4">
                                                        {groupedItinerary[dateKey].map(item => (
                                                            <div key={item.id} className="bg-white p-6 rounded-[1.8rem] border border-slate-100 shadow-sm hover:border-blue-500 transition-all">
                                                                {editingItemId === item.id ? (
                                                                    <div className="space-y-4"><input type="text" className="w-full bg-slate-50 px-4 py-3 rounded-xl font-bold" value={tempItem.title} onChange={e => setTempItem({...tempItem, title: e.target.value})} />
                                                                        <div className="grid grid-cols-2 gap-3"><input type="date" className="w-full bg-slate-50 px-4 py-3 rounded-xl text-xs font-bold" value={tempItem.date} onChange={e => setTempItem({...tempItem, date: e.target.value})} /><input type="time" className="w-full bg-slate-50 px-4 py-3 rounded-xl text-xs font-bold" value={tempItem.time} onChange={e => setTempItem({...tempItem, time: e.target.value})} /></div>
                                                                        <div className="grid grid-cols-2 gap-3"><input type="number" placeholder="Cost" className="w-full bg-slate-50 px-4 py-3 rounded-xl text-xs font-bold" value={tempItem.cost} onChange={e => setTempItem({...tempItem, cost: e.target.value})} /><select className="w-full bg-slate-50 px-4 py-3 rounded-xl text-xs font-bold" value={tempItem.category} onChange={e => setTempItem({...tempItem, category: e.target.value})}><option>Activity</option><option>Transport</option><option>Food</option><option>Hotel</option></select></div>
                                                                        <input type="text" placeholder="URL" className="w-full bg-slate-50 px-4 py-3 rounded-xl text-xs font-bold" value={tempItem.url} onChange={e => setTempItem({...tempItem, url: e.target.value})} /><textarea placeholder="Notes" className="w-full bg-slate-50 px-4 py-3 rounded-xl text-xs font-bold h-20" value={tempItem.notes} onChange={e => setTempItem({...tempItem, notes: e.target.value})} />
                                                                        <div className="flex gap-2"><button onClick={updateItem} className="flex-1 bg-slate-900 text-white font-bold py-3 rounded-xl text-[10px] uppercase">Save</button><button onClick={() => setEditingItemId(null)} className="flex-1 bg-slate-100 font-bold py-3 rounded-xl text-[10px] uppercase">Cancel</button></div>
                                                                    </div>
                                                                ) : (
                                                                    <div className="flex items-start justify-between gap-4"><div className="flex-1"><div className="flex items-center gap-3 mb-1"><span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-[8px] font-black uppercase">{item.category}</span><span className="font-mono text-[10px] font-bold text-slate-400">{item.time || 'Flexible'}</span>{isBudgetActive && <span className="font-mono text-[10px] font-black text-blue-600">${item.cost}</span>}</div><h4 className="text-lg font-bold text-slate-900 uppercase">{item.title}</h4>{item.notes && <p className="text-[11px] text-slate-500 mt-2">{item.notes}</p>}<div className="flex gap-4 mt-3"><button onClick={() => startEditing(item)} className="text-[9px] font-black uppercase text-slate-300 hover:text-slate-900 flex items-center gap-1"><Icons.Edit /> Edit</button><button onClick={(e) => deleteItem(e, item.id)} className="text-[9px] font-black uppercase text-slate-300 hover:text-rose-500 flex items-center gap-1"><Icons.Trash /> Delete</button>{item.url && <a href={item.url} target="_blank" className="text-[9px] font-black uppercase text-blue-400 hover:text-blue-600 flex items-center gap-1"><Icons.Link /> Link</a>}</div></div>{item.url && <QRCode value={item.url} />}</div>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : view === 'analytics' ? (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                        <div className="md:col-span-2 space-y-8">
                                            <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm"><h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Budget Overview</h4><div className="text-5xl font-extrabold text-slate-900 mb-6 tracking-tighter">${stats.total} <span className="text-slate-200 text-3xl">/ ${activeTrip?.budgetLimit || 0}</span></div><div className="w-full h-3 bg-slate-50 rounded-full overflow-hidden"><div className={`h-full rounded-full transition-all duration-1000 ${stats.total > (activeTrip?.budgetLimit || 0) ? 'bg-rose-500' : 'bg-blue-600'}`} style={{ width: `${Math.min((stats.total / (activeTrip?.budgetLimit || 1)) * 100, 100)}%` }}></div></div></div>
                                            <div className="grid grid-cols-2 gap-4">{Object.entries(stats.byCat).map(([cat, val]) => (<div key={cat} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm"><span className="text-[10px] font-bold text-slate-400 uppercase block mb-1">{cat}</span><span className="text-xl font-extrabold">${val}</span></div>))}</div>
                                        </div>
                                        <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] h-fit shadow-2xl"><div className="flex items-center gap-3 mb-6"><Icons.Wallet /> <h4 className="text-[10px] font-bold uppercase tracking-widest">Guardrails</h4></div><label className="text-[10px] text-slate-400 block mb-2 uppercase font-bold">Total Spend Cap</label><input type="number" className="bg-white/10 w-full p-4 rounded-xl font-bold text-xl outline-none border border-white/10 focus:border-white/40" value={activeTrip?.budgetLimit || 0} onChange={e => saveTripState({ budgetLimit: parseFloat(e.target.value) || 0 })} /></div>
                                    </div>
                                ) : (
                                    <div className="max-w-2xl mx-auto space-y-8">
                                        <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm"><div className="flex items-center gap-3 mb-8"><Icons.Edit /> <h3 className="text-xl font-extrabold tracking-tight">Configuration</h3></div><div className="flex items-center justify-between p-6 bg-slate-50 rounded-3xl border border-slate-100 mb-6"><div className="flex items-center gap-4"><div className={`p-3 rounded-2xl ${isBudgetActive ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-400'}`}>{isBudgetActive ? <Icons.Wallet /> : <Icons.X />}</div><div><h4 className="font-bold text-slate-900">Expense Tracking</h4><p className="text-xs text-slate-400">Audit costs across the trip</p></div></div><button onClick={() => saveTripState({ trackBudget: !isBudgetActive })} className={`w-14 h-8 rounded-full transition-colors relative ${isBudgetActive ? 'bg-blue-600' : 'bg-slate-300'}`}><div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all shadow-md ${isBudgetActive ? 'left-7' : 'left-1'}`}></div></button></div><div className="pt-8 border-t border-slate-100"><h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4">Danger Zone</h4><button onClick={() => { const nextTrips = trips.filter(t => t.id !== activeTrip.id); setTrips(nextTrips); syncToSheets(nextTrips); setView('dashboard'); setActiveTrip(null); }} className="w-full p-4 border border-rose-100 text-rose-500 font-bold rounded-2xl text-[10px] hover:bg-rose-50 transition-colors uppercase">Abort Expedition</button></div></div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
