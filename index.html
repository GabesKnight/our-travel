<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetTravel - Pro Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Adding QRCode library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        input, select, textarea { font-family: inherit; }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            .itinerary-container { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .day-group { break-inside: avoid; margin-bottom: 2rem; }
            .sticky { position: static !important; }
            main { padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
            .lg\:col-span-8 { width: 100% !important; }
            .qr-container { display: block !important; }
        }
        .print-only { display: none; }
        .qr-container { display: none; }
        
        /* Smooth transitions for UI interaction */
        .item-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        const Icons = {
            Plane: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>,
            Map: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Link: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR0z8w4vut1oWjNVoIx3c6VuEAybJD6biDhCV12J3XHX3oZKMhQKbTDzLgZLsG5Nwd/exec";

        const formatDateToDDMMYYYY = (dateStr) => {
            if (!dateStr || dateStr === 'Unscheduled') return 'Unscheduled';
            try {
                const [year, month, day] = dateStr.split('-');
                if (!year || !month || !day) return dateStr;
                return `${day}/${month}/${year}`;
            } catch (e) {
                return dateStr;
            }
        };

        const QRCodeItem = ({ url, id }) => {
            const qrRef = useRef(null);
            
            useEffect(() => {
                if (qrRef.current && url) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, {
                        text: url,
                        width: 80,
                        height: 80,
                        colorDark : "#0f172a",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            }, [url]);

            if (!url) return null;

            return (
                <div className="qr-container flex flex-col items-center gap-1 ml-4 border-l pl-4 border-slate-100">
                    <div ref={qrRef} className="bg-white p-1 rounded border border-slate-200"></div>
                    <span className="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Scan to Link</span>
                </div>
            );
        };

        const App = () => {
            const [trips, setTrips] = useState([]);
            const [activeTrip, setActiveTrip] = useState(null);
            const [syncing, setSyncing] = useState(false);
            const [view, setView] = useState('dashboard');
            const [editingItemId, setEditingItemId] = useState(null);
            
            const [newTripName, setNewTripName] = useState('');
            const [itineraryItem, setItineraryItem] = useState({ 
                title: '', time: '', date: '', cost: 0, url: '', notes: '', category: 'Activity' 
            });

            const fetchData = async () => {
                if (!SCRIPT_URL) return;
                setSyncing(true);
                try {
                    const response = await fetch(SCRIPT_URL);
                    if (!response.ok) throw new Error('Failed to fetch');
                    const data = await response.json();
                    setTrips(Array.isArray(data) ? data : []);
                    if (activeTrip) {
                        const updated = data.find(t => t.id === activeTrip.id);
                        if (updated) setActiveTrip(updated);
                    }
                } catch (err) {
                    console.error("Sync error.", err);
                } finally {
                    setSyncing(false);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 45000);
                return () => clearInterval(interval);
            }, [activeTrip?.id]);

            const syncToSheets = async (updatedTrips) => {
                setSyncing(true);
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedTrips)
                    });
                    setTimeout(fetchData, 1000);
                } catch (err) {
                    console.error("Save failed.", err);
                } finally {
                    setSyncing(false);
                }
            };

            const createTrip = async (e) => {
                e.preventDefault();
                if (!newTripName.trim()) return;
                const newTrip = { id: crypto.randomUUID(), name: newTripName, createdAt: Date.now(), itinerary: [], budget: 0 };
                const updated = [...trips, newTrip];
                setTrips(updated);
                await syncToSheets(updated);
                setNewTripName('');
            };

            const addItineraryItem = async () => {
                if (!itineraryItem.title || !activeTrip) return;
                const newItem = { ...itineraryItem, id: crypto.randomUUID() };
                const updatedItinerary = [...(activeTrip.itinerary || []), newItem];
                
                updatedItinerary.sort((a, b) => {
                    const dateA = new Date((a.date || '9999-12-31') + 'T' + (a.time || '00:00'));
                    const dateB = new Date((b.date || '9999-12-31') + 'T' + (b.time || '00:00'));
                    return dateA - dateB;
                });

                const totalBudget = updatedItinerary.reduce((sum, item) => sum + (parseFloat(item.cost) || 0), 0);
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, itinerary: updatedItinerary, budget: totalBudget } : t);
                setTrips(updatedTrips);
                await syncToSheets(updatedTrips);
                setItineraryItem({ title: '', time: '', date: '', cost: 0, url: '', notes: '', category: 'Activity' });
            };

            const updateItem = async (itemId, updatedFields) => {
                const updatedItinerary = activeTrip.itinerary.map(item => 
                    item.id === itemId ? { ...item, ...updatedFields } : item
                );
                
                updatedItinerary.sort((a, b) => {
                    const dateA = new Date((a.date || '9999-12-31') + 'T' + (a.time || '00:00'));
                    const dateB = new Date((b.date || '9999-12-31') + 'T' + (b.time || '00:00'));
                    return dateA - dateB;
                });
                
                const totalBudget = updatedItinerary.reduce((sum, item) => sum + (parseFloat(item.cost) || 0), 0);
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, itinerary: updatedItinerary, budget: totalBudget } : t);
                
                setTrips(updatedTrips);
                setActiveTrip({ ...activeTrip, itinerary: updatedItinerary, budget: totalBudget });
                await syncToSheets(updatedTrips);
            };

            const removeItineraryItem = async (e, itemId) => {
                e.stopPropagation();
                const updatedItinerary = activeTrip.itinerary.filter(item => item.id !== itemId);
                const totalBudget = updatedItinerary.reduce((sum, item) => sum + (parseFloat(item.cost) || 0), 0);
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, itinerary: updatedItinerary, budget: totalBudget } : t);
                setTrips(updatedTrips);
                await syncToSheets(updatedTrips);
            };

            const groupedItinerary = useMemo(() => {
                if (!activeTrip?.itinerary) return {};
                return activeTrip.itinerary.reduce((groups, item) => {
                    const dateKey = item.date || 'Unscheduled';
                    if (!groups[dateKey]) groups[dateKey] = [];
                    groups[dateKey].push(item);
                    return groups;
                }, {});
            }, [activeTrip?.itinerary]);

            const exportPDF = () => {
                window.print();
            };

            return (
                <div className="min-h-screen pb-12">
                    <nav className="no-print bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => { setView('dashboard'); setActiveTrip(null); }}>
                            <div className="bg-emerald-600 p-2.5 rounded-xl text-white shadow-lg shadow-emerald-100">
                                <Icons.Plane />
                            </div>
                            <h1 className="text-xl font-black tracking-tight text-slate-800">SheetTravel</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            {syncing && <div className="text-emerald-600 text-xs font-bold flex items-center gap-1.5 bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-100 italic animate-pulse">Syncing...</div>}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {view === 'dashboard' ? (
                            <div className="space-y-10">
                                <header className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                                    <div>
                                        <h2 className="text-4xl font-black text-slate-900 tracking-tight">Your Adventures</h2>
                                        <p className="text-slate-500 font-medium mt-2 text-lg">Travel smarter with spreadsheet precision.</p>
                                    </div>
                                    <form onSubmit={createTrip} className="flex gap-2 p-1.5 bg-white rounded-2xl shadow-sm border border-slate-200 w-full md:w-auto">
                                        <input 
                                            type="text" placeholder="Trip name..." 
                                            className="px-4 py-2 bg-transparent focus:outline-none w-full md:w-64 font-medium text-slate-700"
                                            value={newTripName} onChange={(e) => setNewTripName(e.target.value)}
                                        />
                                        <button type="submit" className="bg-slate-900 hover:bg-emerald-600 text-white px-6 py-2.5 rounded-xl flex items-center gap-2 font-bold transition-all shadow-lg active:scale-95">
                                            <Icons.Plus /> Plan
                                        </button>
                                    </form>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {trips.map(trip => (
                                        <div key={trip.id} onClick={() => { setActiveTrip(trip); setView('trip-details'); }} className="group bg-white p-7 rounded-[2rem] border border-slate-200 hover:shadow-2xl hover:border-emerald-200 transition-all cursor-pointer relative">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="bg-emerald-50 text-emerald-600 p-4 rounded-2xl group-hover:bg-emerald-600 group-hover:text-white transition-colors"><Icons.MapPin /></div>
                                                <button onClick={(e) => { e.stopPropagation(); const updated = trips.filter(t => t.id !== trip.id); setTrips(updated); syncToSheets(updated); }} className="text-slate-300 hover:text-rose-500 p-2 hover:bg-rose-50 rounded-xl transition-all"><Icons.Trash /></button>
                                            </div>
                                            <h3 className="text-2xl font-black text-slate-800 mb-2 group-hover:text-emerald-700 transition-colors">{trip.name}</h3>
                                            <div className="flex items-center gap-5 mt-6 pt-6 border-t border-slate-50 text-slate-500 text-sm font-bold">
                                                <span className="flex items-center gap-1.5">${trip.budget || 0}</span>
                                                <span className="flex items-center gap-1.5">{trip.itinerary?.length || 0} stops</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                <div className="no-print flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setView('dashboard')} className="text-slate-600 hover:text-emerald-600 flex items-center gap-2 font-bold bg-white px-5 py-2.5 rounded-2xl border border-slate-200 shadow-sm transition-all hover:bg-slate-50">
                                            <Icons.ArrowLeft /> Back
                                        </button>
                                        <button onClick={exportPDF} className="bg-emerald-600 text-white flex items-center gap-2 font-bold px-6 py-3 rounded-2xl shadow-xl hover:bg-emerald-700 transition-all active:scale-95 group">
                                            <Icons.Download /> 
                                            <span>Export to PDF</span>
                                            <span className="ml-2 text-[10px] bg-white/20 px-2 py-0.5 rounded-md no-print">+ QR Codes</span>
                                        </button>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <h2 className="text-2xl font-black text-slate-800 mr-4">{activeTrip?.name}</h2>
                                        <div className="bg-slate-900 text-white px-6 py-2.5 rounded-2xl font-black shadow-lg">
                                            Total: ${activeTrip?.budget} 
                                        </div>
                                    </div>
                                </div>

                                <div className="print-only mb-10 pt-4">
                                    <div className="flex justify-between items-end border-b-4 border-slate-900 pb-4">
                                        <div>
                                            <h1 className="text-5xl font-black text-slate-900 tracking-tighter">TRAVEL ITINERARY</h1>
                                            <p className="text-2xl font-bold text-emerald-600 mt-1 uppercase tracking-widest">{activeTrip?.name}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-sm font-black text-slate-400">TOTAL ESTIMATED BUDGET</p>
                                            <p className="text-3xl font-black text-slate-900">${activeTrip?.budget}</p>
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-4 font-medium italic">Generated by SheetTravel on {new Date().toLocaleDateString()}</p>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    <div className="lg:col-span-4 no-print">
                                        <div className="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm sticky top-24 space-y-4">
                                            <div className="flex items-center justify-between mb-2">
                                                <h3 className="text-xl font-black text-slate-800">New Stop</h3>
                                                <div className="p-2 bg-slate-50 rounded-lg text-slate-400"><Icons.Plus /></div>
                                            </div>
                                            <input type="text" placeholder="Title" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" value={itineraryItem.title} onChange={(e) => setItineraryItem({...itineraryItem, title: e.target.value})}/>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1 tracking-widest">Date</label>
                                                    <input type="date" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none" value={itineraryItem.date} onChange={(e) => setItineraryItem({...itineraryItem, date: e.target.value})}/>
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1 tracking-widest">Time</label>
                                                    <input type="time" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none" value={itineraryItem.time} onChange={(e) => setItineraryItem({...itineraryItem, time: e.target.value})}/>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1 tracking-widest">Cost ($)</label>
                                                    <input type="number" placeholder="0" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none" value={itineraryItem.cost} onChange={(e) => setItineraryItem({...itineraryItem, cost: e.target.value})}/>
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1 tracking-widest">Category</label>
                                                    <select className="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer" value={itineraryItem.category} onChange={(e) => setItineraryItem({...itineraryItem, category: e.target.value})}>
                                                        <option>Activity</option><option>Transport</option><option>Stay</option><option>Food</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1 tracking-widest">Link (PDF QR Code)</label>
                                                <input type="url" placeholder="https://..." className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none" value={itineraryItem.url} onChange={(e) => setItineraryItem({...itineraryItem, url: e.target.value})}/>
                                            </div>
                                            <textarea placeholder="Additional notes or address..." className="w-full px-4 py-3 rounded-xl border border-slate-200 resize-none h-24 focus:ring-2 focus:ring-emerald-500 outline-none" value={itineraryItem.notes} onChange={(e) => setItineraryItem({...itineraryItem, notes: e.target.value})}></textarea>
                                            <button onClick={addItineraryItem} className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-emerald-600 transition-all active:scale-95 mt-2">Add Stop</button>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-8 space-y-8">
                                        <div className="itinerary-container bg-white rounded-[2.5rem] border border-slate-200 shadow-sm p-8 min-h-[500px]">
                                            {Object.keys(groupedItinerary).sort().length === 0 ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                                                    <div className="mb-4 opacity-20"><Icons.Map /></div>
                                                    <p className="font-bold">Your itinerary is empty. Add a stop to get started!</p>
                                                </div>
                                            ) : (
                                                Object.keys(groupedItinerary).sort().map(dateKey => (
                                                    <div key={dateKey} className="day-group">
                                                        <div className="flex items-center gap-4 mb-6 sticky top-20 z-10 bg-white/95 backdrop-blur-sm py-2 no-print">
                                                            <div className="bg-slate-900 text-white px-4 py-1.5 rounded-full text-sm font-black shadow-md tracking-wider">
                                                                {formatDateToDDMMYYYY(dateKey)}
                                                            </div>
                                                            <div className="h-px bg-slate-100 flex-1"></div>
                                                        </div>

                                                        <div className="print-only mb-6">
                                                            <h3 className="text-xl font-black text-slate-900 border-b-2 border-slate-100 pb-2">{formatDateToDDMMYYYY(dateKey)}</h3>
                                                        </div>

                                                        <div className="space-y-6 border-l-2 border-slate-50 ml-6 pl-8 pb-10">
                                                            {groupedItinerary[dateKey].map(item => (
                                                                <div key={item.id} 
                                                                     onClick={() => setEditingItemId(item.id)}
                                                                     className={`item-card group bg-white p-6 rounded-3xl border ${editingItemId === item.id ? 'border-emerald-500 ring-4 ring-emerald-50 shadow-2xl scale-[1.01]' : 'border-slate-100 hover:shadow-md hover:border-emerald-100'} cursor-pointer`}>
                                                                    
                                                                    {editingItemId === item.id ? (
                                                                        <div className="space-y-4 animate-in fade-in slide-in-from-top-1 duration-200" onClick={(e) => e.stopPropagation()}>
                                                                            <div className="flex items-center justify-between mb-4">
                                                                                <div className="text-xs font-black text-emerald-600 uppercase tracking-widest flex items-center gap-2">
                                                                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                                                                    Quick Edit
                                                                                </div>
                                                                                <button onClick={() => setEditingItemId(null)} className="text-emerald-500 hover:text-emerald-700 transition-colors p-1">
                                                                                    <Icons.Check />
                                                                                </button>
                                                                            </div>
                                                                            
                                                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                                <div className="col-span-full">
                                                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1">Title</label>
                                                                                    <input className="w-full p-3 border rounded-xl font-bold bg-slate-50 focus:bg-white transition-all outline-none border-slate-200 focus:border-emerald-400" defaultValue={item.title} onBlur={(e) => updateItem(item.id, {title: e.target.value})} />
                                                                                </div>
                                                                                <div>
                                                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1">Date</label>
                                                                                    <input type="date" className="w-full p-3 border rounded-xl bg-slate-50 focus:bg-white outline-none border-slate-200" defaultValue={item.date} onBlur={(e) => updateItem(item.id, {date: e.target.value})} />
                                                                                </div>
                                                                                <div>
                                                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1">Time</label>
                                                                                    <input type="time" className="w-full p-3 border rounded-xl bg-slate-50 focus:bg-white outline-none border-slate-200" defaultValue={item.time} onBlur={(e) => updateItem(item.id, {time: e.target.value})} />
                                                                                </div>
                                                                                <div>
                                                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1">Category</label>
                                                                                    <select className="w-full p-3 border rounded-xl bg-slate-50 focus:bg-white outline-none border-slate-200" defaultValue={item.category} onBlur={(e) => updateItem(item.id, {category: e.target.value})}>
                                                                                        <option>Activity</option><option>Transport</option><option>Stay</option><option>Food</option>
                                                                                    </select>
                                                                                </div>
                                                                                <div>
                                                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1">Cost ($)</label>
                                                                                    <input type="number" className="w-full p-3 border rounded-xl bg-slate-50 focus:bg-white outline-none border-slate-200" defaultValue={item.cost} onBlur={(e) => updateItem(item.id, {cost: e.target.value})} />
                                                                                </div>
                                                                                <div className="col-span-full">
                                                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1">URL</label>
                                                                                    <input type="url" className="w-full p-3 border rounded-xl bg-slate-50 focus:bg-white outline-none border-slate-200" defaultValue={item.url} onBlur={(e) => updateItem(item.id, {url: e.target.value})} />
                                                                                </div>
                                                                                <div className="col-span-full">
                                                                                    <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block px-1">Notes</label>
                                                                                    <textarea className="w-full p-3 border rounded-xl text-sm bg-slate-50 focus:bg-white outline-none border-slate-200 h-24" defaultValue={item.notes} onBlur={(e) => updateItem(item.id, {notes: e.target.value})} />
                                                                                </div>
                                                                            </div>
                                                                            <div className="flex justify-between items-center pt-2">
                                                                                <button onClick={(e) => removeItineraryItem(e, item.id)} className="text-rose-500 text-xs font-black hover:bg-rose-50 px-4 py-2 rounded-lg transition-all tracking-widest">DELETE STOP</button>
                                                                                <button onClick={() => setEditingItemId(null)} className="bg-slate-900 text-white px-8 py-2.5 rounded-xl text-sm font-black shadow-lg hover:bg-emerald-600 transition-all">Save Changes</button>
                                                                            </div>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="flex justify-between items-center">
                                                                            <div className="flex-1 space-y-1">
                                                                                <div className="flex items-center gap-2 text-xs font-black text-slate-400">
                                                                                    <span className={`px-2 py-0.5 rounded-md text-[10px] ${
                                                                                        item.category === 'Transport' ? 'bg-blue-50 text-blue-600' :
                                                                                        item.category === 'Stay' ? 'bg-indigo-50 text-indigo-600' :
                                                                                        item.category === 'Food' ? 'bg-orange-50 text-orange-600' :
                                                                                        'bg-emerald-50 text-emerald-600'
                                                                                    }`}>{item.category?.toUpperCase()}</span>
                                                                                    <span>•</span>
                                                                                    <span className="text-slate-600 font-bold tracking-tight">{item.time || 'Time TBD'}</span>
                                                                                </div>
                                                                                <h4 className="text-xl font-black text-slate-800 leading-tight group-hover:text-emerald-700 transition-colors">{item.title}</h4>
                                                                                {item.notes && <p className="text-sm text-slate-500 mt-1 italic">"{item.notes}"</p>}
                                                                                <div className="flex gap-3 mt-4">
                                                                                    {item.url && (
                                                                                        <a href={item.url} target="_blank" onClick={(e) => e.stopPropagation()} className="flex items-center gap-1.5 text-[11px] font-black text-emerald-600 bg-emerald-50/50 hover:bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-100/50 transition-all no-print">
                                                                                            <Icons.Link /> OPEN LINK
                                                                                        </a>
                                                                                    )}
                                                                                    <span className="text-[11px] font-black bg-slate-50 px-3 py-1.5 rounded-lg text-slate-600 border border-slate-100">EST. ${item.cost || 0}</span>
                                                                                </div>
                                                                            </div>
                                                                            <div className="flex items-center">
                                                                                <QRCodeItem url={item.url} id={item.id} />
                                                                                <div className="flex flex-col items-end gap-2 no-print ml-4">
                                                                                    <div className="opacity-0 group-hover:opacity-100 transition-all bg-emerald-50 text-emerald-600 p-2 rounded-xl border border-emerald-100 shadow-sm">
                                                                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
