<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetTravel - Pro Trip Planner</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Inline SVG components to replace lucide-react in HTML environment
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzR0z8w4vut1oWjNVoIx3c6VuEAybJD6biDhCV12J3XHX3oZKMhQKbTDzLgZLsG5Nwd/exec";

        const App = () => {
            const [trips, setTrips] = useState([]);
            const [activeTrip, setActiveTrip] = useState(null);
            const [syncing, setSyncing] = useState(false);
            const [error, setError] = useState(null);
            const [view, setView] = useState('dashboard');
            
            const [newTripName, setNewTripName] = useState('');
            const [itineraryItem, setItineraryItem] = useState({ title: '', time: '', date: '', cost: 0 });

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            const fetchData = async () => {
                if (!SCRIPT_URL) return;
                setSyncing(true);
                setError(null);
                try {
                    const response = await fetch(SCRIPT_URL);
                    if (!response.ok) throw new Error('Failed to reach Google Sheets');
                    const data = await response.json();
                    setTrips(Array.isArray(data) ? data : []);
                    
                    if (activeTrip) {
                        const updated = data.find(t => t.id === activeTrip.id);
                        if (updated) setActiveTrip(updated);
                    }
                } catch (err) {
                    setError("Connection issue. Ensure Apps Script is deployed to 'Anyone'.");
                } finally {
                    setSyncing(false);
                    setTimeout(() => window.lucide && window.lucide.createIcons(), 100);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 15000);
                return () => clearInterval(interval);
            }, [activeTrip?.id]);

            const syncToSheets = async (updatedTrips) => {
                setSyncing(true);
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedTrips)
                    });
                    setTimeout(fetchData, 1500); 
                } catch (err) {
                    setError("Failed to save changes.");
                } finally {
                    setSyncing(false);
                }
            };

            const createTrip = async (e) => {
                e.preventDefault();
                if (!newTripName.trim()) return;
                const newTrip = { id: crypto.randomUUID(), name: newTripName, createdAt: Date.now(), itinerary: [], budget: 0 };
                const updated = [...trips, newTrip];
                setTrips(updated);
                await syncToSheets(updated);
                setNewTripName('');
            };

            const addItineraryItem = async () => {
                if (!itineraryItem.title || !activeTrip) return;
                const newItem = { ...itineraryItem, id: crypto.randomUUID() };
                const updatedItinerary = [...(activeTrip.itinerary || []), newItem];
                const totalBudget = updatedItinerary.reduce((sum, item) => sum + (parseFloat(item.cost) || 0), 0);
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, itinerary: updatedItinerary, budget: totalBudget } : t);
                setTrips(updatedTrips);
                await syncToSheets(updatedTrips);
                setItineraryItem({ title: '', time: '', date: '', cost: 0 });
            };

            const removeItineraryItem = async (itemId) => {
                const updatedItinerary = activeTrip.itinerary.filter(item => item.id !== itemId);
                const totalBudget = updatedItinerary.reduce((sum, item) => sum + (parseFloat(item.cost) || 0), 0);
                const updatedTrips = trips.map(t => t.id === activeTrip.id ? { ...t, itinerary: updatedItinerary, budget: totalBudget } : t);
                setTrips(updatedTrips);
                await syncToSheets(updatedTrips);
            };

            const deleteTrip = async (e, id) => {
                e.stopPropagation();
                const updated = trips.filter(t => t.id !== id);
                setTrips(updated);
                await syncToSheets(updated);
            };

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('dashboard'); setActiveTrip(null); }}>
                            <div className="bg-emerald-600 p-2 rounded-lg text-white">
                                <Icon name="plane" />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">SheetTravel</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            {error && <div className="text-rose-500 text-xs font-medium bg-rose-50 px-3 py-1 rounded-full border border-rose-100 flex items-center gap-1"><Icon name="alert-circle" size={14}/> {error}</div>}
                            {syncing && <div className="text-emerald-600 text-xs font-bold animate-pulse flex items-center gap-1"><Icon name="refresh-cw" size={14} className="animate-spin" /> Syncing...</div>}
                            <div className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold border border-slate-200 flex items-center gap-1">
                                <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                                Live
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-5xl mx-auto p-6">
                        {view === 'dashboard' ? (
                            <div className="space-y-8">
                                <header className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                                    <div>
                                        <h2 className="text-3xl font-extrabold">Your Adventures</h2>
                                        <p className="text-slate-500 mt-1">Real-time sync to Google Sheets.</p>
                                    </div>
                                    <form onSubmit={createTrip} className="flex gap-2">
                                        <input 
                                            type="text" placeholder="Trip Name" 
                                            className="px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 w-64 outline-none"
                                            value={newTripName} onChange={(e) => setNewTripName(e.target.value)}
                                        />
                                        <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-xl flex items-center gap-2 font-semibold shadow-lg">
                                            <Icon name="plus" size={18} /> New Trip
                                        </button>
                                    </form>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {trips.length === 0 && !syncing ? (
                                        <div className="col-span-full py-24 text-center border-2 border-dashed border-slate-200 rounded-3xl bg-white/50">
                                            <Icon name="compass" size={48} className="mx-auto text-slate-300 mb-4" />
                                            <p className="text-slate-400 font-medium">No trips yet.</p>
                                        </div>
                                    ) : (
                                        trips.map(trip => (
                                            <div key={trip.id} onClick={() => { setActiveTrip(trip); setView('trip-details'); }} className="bg-white p-6 rounded-3xl border border-slate-200 hover:shadow-xl transition-all cursor-pointer relative group">
                                                <div className="flex justify-between items-start mb-4">
                                                    <div className="bg-emerald-50 text-emerald-600 p-3 rounded-2xl"><Icon name="map-pin" size={24} /></div>
                                                    <button onClick={(e) => deleteTrip(e, trip.id)} className="text-slate-300 hover:text-rose-500 p-2"><Icon name="trash-2" size={16} /></button>
                                                </div>
                                                <h3 className="text-xl font-bold mb-1">{trip.name}</h3>
                                                <div className="flex items-center gap-4 mt-4 pt-4 border-t border-slate-50 text-slate-500 text-sm">
                                                    <span className="flex items-center gap-1"><Icon name="wallet" size={14} className="text-emerald-500"/> ${trip.budget || 0}</span>
                                                    <span className="flex items-center gap-1"><Icon name="calendar" size={14} className="text-emerald-500"/> {trip.itinerary?.length || 0} items</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-in slide-in-from-right duration-300">
                                <button onClick={() => setView('dashboard')} className="text-slate-500 hover:text-emerald-600 flex items-center gap-1 mb-6 font-medium bg-white px-4 py-2 rounded-xl border border-slate-100 shadow-sm">
                                    <Icon name="chevron-left" size={18} /> Back
                                </button>
                                <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                    <div className="flex items-center justify-between mb-8">
                                        <h2 className="text-3xl font-black">{activeTrip?.name}</h2>
                                        <div className="bg-emerald-600 text-white px-5 py-2 rounded-2xl flex items-center gap-2 font-bold shadow-lg">
                                            <Icon name="dollar-sign" size={18} /> {activeTrip?.budget} Total
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-2xl mb-8 border border-slate-100">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <input type="text" placeholder="Activity" className="md:col-span-2 px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-emerald-500" value={itineraryItem.title} onChange={(e) => setItineraryItem({...itineraryItem, title: e.target.value})}/>
                                            <input type="date" className="px-4 py-3 rounded-xl border border-slate-200 outline-none" value={itineraryItem.date} onChange={(e) => setItineraryItem({...itineraryItem, date: e.target.value})}/>
                                            <input type="time" className="px-4 py-3 rounded-xl border border-slate-200 outline-none" value={itineraryItem.time} onChange={(e) => setItineraryItem({...itineraryItem, time: e.target.value})}/>
                                            <input type="number" placeholder="Cost" className="px-4 py-3 rounded-xl border border-slate-200 outline-none" value={itineraryItem.cost} onChange={(e) => setItineraryItem({...itineraryItem, cost: e.target.value})}/>
                                            <button onClick={addItineraryItem} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-lg">Add Activity</button>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        {activeTrip?.itinerary?.map((item) => (
                                            <div key={item.id} className="flex items-center gap-4 p-5 rounded-2xl border border-slate-100 bg-white group hover:shadow-md transition-all">
                                                <div className="bg-emerald-50 p-3 rounded-xl text-emerald-600"><Icon name="clock" size={20} /></div>
                                                <div className="flex-1">
                                                    <h5 className="font-bold">{item.title}</h5>
                                                    <div className="flex gap-3 text-xs text-slate-500 mt-1">
                                                        <span>{item.date}</span><span>{item.time}</span><span className="ml-auto font-bold text-emerald-600">${item.cost}</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => removeItineraryItem(item.id)} className="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-rose-500"><Icon name="trash-2" size={18} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
